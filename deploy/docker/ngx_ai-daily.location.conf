# AI Daily 静态站点 — Nginx location 片段
# 部署位置：/etc/nginx/locations.d/ngx_ai-daily.location.conf
# 被 /etc/nginx/conf.d/ngx_javey.pro.conf 的 www.javey.pro server block include

# 无尾斜杠重定向（/ai-daily → /ai-daily/）
location = /ai-daily {
    return 301 /ai-daily/;
}

# AI Daily 静态站点
location /ai-daily/ {
    alias /data/aidaily/www/ai-daily/;
    index index.html;
    try_files $uri $uri/index.html $uri/ =404;

    # HTML 不设强缓存，确保用户总能加载引用最新 chunk 的页面
    add_header Cache-Control "no-cache, must-revalidate";
}

# AI Daily 静态资源（CSS/JS）— 长缓存
location /ai-daily/static/ {
    alias /data/aidaily/www/ai-daily/static/;
    expires 30d;
    add_header Cache-Control "public, must-revalidate";
}

# Next.js 静态资源（哈希文件名，永久缓存）
location /ai-daily/_next/ {
    alias /data/aidaily/www/ai-daily/_next/;
    expires 365d;
    add_header Cache-Control "public, immutable";
}

# JSON 数据文件短缓存
location /ai-daily/data/ {
    alias /data/aidaily/www/ai-daily/data/;
    expires 10m;
    add_header Cache-Control "public, must-revalidate";
    add_header Access-Control-Allow-Origin "*";
}

# 搜索数据文件（带内容 hash 的文件名）— 长缓存 immutable
# 文件名形如 search-data-{8位hash}.json，内容变化时 hash 也会变
location ~ ^/ai-daily/search-data-[a-f0-9]+\.json$ {
    root /data/aidaily/www;
    expires 365d;
    add_header Cache-Control "public, immutable";
}

# 搜索 manifest — 短缓存（用来发现新版本数据文件）
location = /ai-daily/search-manifest.json {
    root /data/aidaily/www;
    expires 5m;
    add_header Cache-Control "public, must-revalidate";
}
