{{define "content"}}
<div class="container py-8">
  <div class="mb-8 animate-in">
    <h1 style="font-size:1.875rem;font-weight:700;color:var(--text-primary);margin-bottom:1.5rem;">搜索资讯</h1>
    <div class="search-box">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
      <input id="searchInput" type="text" class="search-input" placeholder="搜索 AI 资讯标题、摘要、标签..." autocomplete="off">
    </div>
    <div class="hot-keywords" id="hotKeywords">
      <span class="label">热门：</span>
      <button class="tag-badge" onclick="doSearch('GPT')">GPT</button>
      <button class="tag-badge" onclick="doSearch('开源模型')">开源模型</button>
      <button class="tag-badge" onclick="doSearch('Agent')">Agent</button>
      <button class="tag-badge" onclick="doSearch('云服务')">云服务</button>
      <button class="tag-badge" onclick="doSearch('RAG')">RAG</button>
      <button class="tag-badge" onclick="doSearch('AI芯片')">AI芯片</button>
      <button class="tag-badge" onclick="doSearch('融资')">融资</button>
      <button class="tag-badge" onclick="doSearch('AI安全')">AI安全</button>
    </div>
  </div>
  <div id="resultCount" class="search-result-count" style="display:none;"></div>
  <div id="results" class="grid-gap-4"></div>
  <div id="emptyState" class="search-empty" style="display:none;">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
    <p id="emptyText"></p>
  </div>
</div>

<!-- Search data (inline JSON) -->
<script id="searchData" type="application/json">{{.SearchDataJSON}}</script>

<!-- Fuse.js 本地文件 -->
<script src="/ai-daily/static/fuse.min.js"></script>

<script>
(function(){
  var data = JSON.parse(document.getElementById('searchData').textContent);
  var fuse = new Fuse(data, {
    keys: [
      { name: 'ct', weight: 2 },
      { name: 'ot', weight: 1.5 },
      { name: 'sm', weight: 1 },
      { name: 'tg', weight: 1.5 },
      { name: 'ca', weight: 1.5 },
      { name: 'sc', weight: 0.5 }
    ],
    threshold: 0.4,
    includeScore: true
  });

  var input = document.getElementById('searchInput');
  var resultsEl = document.getElementById('results');
  var countEl = document.getElementById('resultCount');
  var emptyEl = document.getElementById('emptyState');
  var emptyText = document.getElementById('emptyText');
  var hotEl = document.getElementById('hotKeywords');

  function render(query) {
    if (!query.trim()) {
      resultsEl.innerHTML = '';
      countEl.style.display = 'none';
      emptyEl.style.display = 'none';
      hotEl.style.display = '';
      return;
    }
    hotEl.style.display = 'none';
    var results = fuse.search(query).slice(0, 50);
    if (results.length > 0) {
      countEl.textContent = '找到 ' + results.length + ' 条结果';
      countEl.style.display = '';
      emptyEl.style.display = 'none';
      var html = '';
      for (var i = 0; i < results.length; i++) {
        var item = results[i].item;
        html += '<a href="/ai-daily/daily/' + item.dt + '/" class="glass-card" style="display:block;padding:1.25rem;">' +
          '<h3 style="font-size:1rem;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(item.ct || item.ot) + '</h3>' +
          '<p style="font-size:.875rem;color:var(--text-secondary);margin:.5rem 0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">' + esc(item.sm) + '</p>' +
          '<div class="article-meta"><span style="font-size:.75rem;color:#60a5fa;">' + item.dt + '</span><span style="font-size:.75rem;color:var(--text-secondary);">' + esc(item.sc) + '</span></div>' +
          '</a>';
      }
      resultsEl.innerHTML = html;
    } else {
      countEl.style.display = 'none';
      resultsEl.innerHTML = '';
      emptyText.textContent = '没有找到与 "' + query + '" 相关的资讯';
      emptyEl.style.display = '';
    }
  }

  var timer;
  input.addEventListener('input', function() {
    clearTimeout(timer);
    timer = setTimeout(function(){ render(input.value); }, 200);
  });

  window.doSearch = function(kw) {
    input.value = kw;
    input.focus();
    render(kw);
  };

  function esc(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
})();
</script>
{{end}}
